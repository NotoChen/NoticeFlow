name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    # macos-15：Finder 排版脚本在该镜像上验证可用（macos-26 未验证）。
    runs-on: macos-15

    env:
      MACOSX_DEPLOYMENT_TARGET: "12.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Run Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Build per-architecture DMGs and updater artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # CI 下 tauri-bundler 默认跳过 DMG 的 Finder 排版（--skip-jenkins），
          # 产出无 .DS_Store 的无样式 DMG；置 true 才会写入图标大小与拖拽布局。
          TAURI_BUNDLER_DMG_IGNORE_CI: "true"
        run: npm run tauri:build:mac:release

      - name: Create updater manifest
        run: npm run release:manifest

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoticeFlow-macOS
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
